apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: code-server-data
  namespace: tools
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: nfs
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-server
  namespace: tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: code-server
  template:
    metadata:
      labels:
        app: code-server
    spec:
      containers:
      - name: code-server
        image: lscr.io/linuxserver/code-server:4.96.4
        ports:
        - containerPort: 8443
        livenessProbe:
          tcpSocket:
            port: 8443
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          tcpSocket:
            port: 8443
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1024Mi
        env:
        - name: PUID
          value: '1000'
        - name: PGID
          value: '1000'
        - name: TZ
          value: America/Chicago
        - name: PASSWORD
          valueFrom:
            secretKeyRef:
              name: code-server-secret
              key: PASSWORD
        - name: SUDO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: code-server-secret
              key: SUDO_PASSWORD
        volumeMounts:
        - name: data
          mountPath: /config
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: code-server-data
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: code-server
---
apiVersion: v1
kind: Service
metadata:
  name: code-server-svc
  namespace: tools
spec:
  selector:
    app: code-server
  ports:
  - port: 80
    targetPort: 8443
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: code-server
  namespace: tools
  annotations:
    gethomepage.dev/enabled: 'true'
    gethomepage.dev/name: VS Code
    gethomepage.dev/group: Tools
    gethomepage.dev/icon: code-server.png
    gethomepage.dev/description: Browser-based VS Code
    gethomepage.dev/siteMonitor: http://code-server-svc.tools.svc.cluster.local
    gethomepage.dev/app: code-server
    gethomepage.dev/pod-selector: ''
    nginx.ingress.kubernetes.io/proxy-read-timeout: '3600'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '3600'
    cert-manager.io/cluster-issuer: homelab-ca-issuer
spec:
  ingressClassName: nginx
  rules:
  - host: code.homelab.lan
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: code-server-svc
            port:
              number: 80
  tls:
  - hosts:
    - code.homelab.lan
    secretName: code-tls
