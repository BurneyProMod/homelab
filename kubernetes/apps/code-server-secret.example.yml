# Example only — do not commit real passwords.
# Create the actual secret manifest at deploy time, then apply it:
#
#   kubectl apply -f code-server-secret.yml
#
# Then reference it in code-server.yml via secretKeyRef.
apiVersion: v1
kind: Secret
metadata:
  name: code-server-secret
  namespace: tools
type: Opaque
stringData:
  PASSWORD: "change-me"
  SUDO_PASSWORD: "change-me"
