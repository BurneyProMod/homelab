apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: trilium-data-proxmox
  namespace: tools
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: proxmox-local
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trilium
  namespace: tools
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: trilium
  template:
    metadata:
      labels:
        app: trilium
    spec:
      containers:
      - name: trilium
        image: triliumnext/notes:v0.94.1
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
        - name: TRILIUM_PORT
          value: '8080'
        volumeMounts:
        - name: data
          mountPath: /home/node/trilium-data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: trilium-data-proxmox
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: trilium
---
apiVersion: v1
kind: Service
metadata:
  name: trilium-svc
  namespace: tools
spec:
  selector:
    app: trilium
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trilium
  namespace: tools
  annotations:
    gethomepage.dev/enabled: 'true'
    gethomepage.dev/name: Trilium
    gethomepage.dev/group: Tools
    gethomepage.dev/icon: trilium.png
    gethomepage.dev/description: Note-taking application
    nginx.ingress.kubernetes.io/proxy-read-timeout: '3600'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '3600'
    gethomepage.dev/app: trilium
    gethomepage.dev/pod-selector: ''
    cert-manager.io/cluster-issuer: homelab-ca-issuer
spec:
  ingressClassName: nginx
  rules:
  - host: trilium.homelab.lan
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: trilium-svc
            port:
              number: 80
  tls:
  - hosts:
    - trilium.homelab.lan
    secretName: trilium-tls
