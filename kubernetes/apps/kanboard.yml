apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kanboard-data
  namespace: tools
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: nfs
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kanboard
  namespace: tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kanboard
  template:
    metadata:
      labels:
        app: kanboard
    spec:
      containers:
      - name: kanboard
        image: kanboard/kanboard:v1.2.43
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 300m
            memory: 256Mi
        volumeMounts:
        - name: data
          mountPath: /var/www/app/data
          subPath: data
        - name: data
          mountPath: /var/www/app/plugins
          subPath: plugins
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: kanboard-data
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: kanboard
---
apiVersion: v1
kind: Service
metadata:
  name: kanboard-svc
  namespace: tools
spec:
  selector:
    app: kanboard
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kanboard
  namespace: tools
  annotations:
    gethomepage.dev/enabled: 'true'
    gethomepage.dev/name: Kanboard
    gethomepage.dev/group: Tools
    gethomepage.dev/icon: kanboard.png
    gethomepage.dev/description: Kanban board
    gethomepage.dev/href: http://kanboard.homelab.lan
    gethomepage.dev/app: kanboard
    gethomepage.dev/pod-selector: ''
    gethomepage.dev/siteMonitor: http://kanboard-svc.tools.svc.cluster.local
    cert-manager.io/cluster-issuer: homelab-ca-issuer
spec:
  ingressClassName: nginx
  rules:
  - host: kanboard.homelab.lan
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kanboard-svc
            port:
              number: 80
  tls:
  - hosts:
    - kanboard.homelab.lan
    secretName: kanboard-tls
