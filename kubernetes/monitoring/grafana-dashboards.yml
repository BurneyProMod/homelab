apiVersion: v1
kind: ConfigMap
metadata:
  name: homelab-overview-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  homelab-overview.json: |
    {
      "title": "Homelab Overview",
      "uid": "homelab-overview",
      "tags": ["homelab"],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "30s",
      "panels": [
        {
          "title": "Nodes Online",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "count(up{job=\"kubernetes-nodes\"} == 1)",
              "legendFormat": "Online",
              "refId": "A"
            },
            {
              "expr": "count(up{job=\"kubernetes-nodes\"} == 0)",
              "legendFormat": "Offline",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 3 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "values": false, "calcs": ["lastNotNull"] },
            "textMode": "auto",
            "colorMode": "background"
          }
        },
        {
          "title": "Pods Running",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 0 },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{phase=\"Running\"})",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "green", "value": 10 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "values": false, "calcs": ["lastNotNull"] },
            "textMode": "auto",
            "colorMode": "background"
          }
        },
        {
          "title": "CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 },
          "targets": [
            {
              "expr": "100 - (avg by(instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "{{ instance }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100
            }
          }
        },
        {
          "title": "Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 },
          "targets": [
            {
              "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
              "legendFormat": "{{ instance }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100
            }
          }
        },
        {
          "title": "Disk Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "(1 - (node_filesystem_avail_bytes{fstype!=\"tmpfs\",mountpoint=\"/\"} / node_filesystem_size_bytes{fstype!=\"tmpfs\",mountpoint=\"/\"})) * 100",
              "legendFormat": "{{ instance }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100
            }
          }
        },
        {
          "title": "Pod Restarts (last 1h)",
          "type": "bargauge",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 4 },
          "targets": [
            {
              "expr": "increase(kube_pod_container_status_restarts_total[1h]) > 0",
              "legendFormat": "{{ namespace }}/{{ pod }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          }
        },
        {
          "title": "Certificate Expiry (days remaining)",
          "type": "table",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 4 },
          "targets": [
            {
              "expr": "(certmanager_certificate_expiration_timestamp_seconds - time()) / 86400",
              "legendFormat": "{{ name }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "d",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 21 },
                  { "color": "green", "value": 60 }
                ]
              }
            }
          }
        }
      ]
    }
