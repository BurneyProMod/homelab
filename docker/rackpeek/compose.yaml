# https://github.com/Timmoth/RackPeek

services:
  rackpeek:
    image: aptacode/rackpeek:latest
    container_name: rackpeek
    labels:
      - homepage.group=Docker
      - homepage.name=RackPeek
      - homepage.href=http://192.168.1.50:3001
      - homepage.description=Rack server monitoring dashboard
    ports:
      - "3001:8080"
    volumes:
      # Need to chown -R 1654:1654 on data
      - ./data:/app/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
